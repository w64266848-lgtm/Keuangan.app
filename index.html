<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Keuangan Pro - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ===== GENERAL ===== */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#4CAF50,#2E8B57);
}
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  width:350px;
  text-align:center;
  transition:0.3s;
}
.container:hover{transform:translateY(-5px);}

/* ===== HEADINGS ===== */
.container h2{
  margin-bottom:30px;
  color:#333;
  font-weight:600;
  font-size:28px;
}

/* ===== INPUTS ===== */
input{
  width:100%;
  padding:12px 15px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  transition:0.3s;
  font-size:16px;
}
input:focus{
  outline:none;
  border-color:#4CAF50;
  box-shadow:0 0 5px rgba(76,175,80,0.5);
}

/* ===== BUTTONS ===== */
button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#45a049;
  transform:translateY(-2px);
}
button.secondary{
  background:#f0f0f0;
  color:#333;
}
button.secondary:hover{
  background:#e0e0e0;
}

/* ===== MESSAGE ===== */
#msg{
  margin-top:15px;
  color:#e74c3c;
  font-weight:500;
  min-height:20px;
  transition:0.3s;
}

/* ===== RESPONSIVE ===== */
@media(max-width:400px){
  .container{
    width:90%;
    padding:30px 20px;
  }
}
</style>
</head>
<body>
<div class="container">
  <h2>Login Keuangan Pro</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button class="secondary" onclick="register()">Daftar</button>
  <p id="msg"></p>
</div>

<script>
function getUsers(){return JSON.parse(localStorage.getItem("users"))||[];}
function saveUsers(d){localStorage.setItem("users",JSON.stringify(d));}

function register(){
  let users=getUsers();
  let uVal=document.getElementById("u").value;
  let pVal=document.getElementById("p").value;
  if(!uVal||!pVal){msg.innerText="Isi dulu!"; return;}
  if(users.find(x=>x.u==uVal)){msg.innerText="Username sudah ada"; return;}
  users.push({u:uVal,p:pVal});
  saveUsers(users);
  msg.style.color="#4CAF50";
  msg.innerText="Berhasil daftar";
}

function login(){
  let users=getUsers();
  let uVal=document.getElementById("u").value;
  let pVal=document.getElementById("p").value;
  let f=users.find(x=>x.u==uVal && x.p==pVal);
  if(f){localStorage.setItem("user",uVal); window.location="dashboard.html";}
  else{
    msg.style.color="#e74c3c";
    msg.innerText="Login gagal";
  }
}
</script>
</body>
</html>
